<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Seven Wonders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14100b; --bg2:#0d0a06;
  --panel:#1f1812; --panel2:#2a2017; --panel3:#352818;
  --ink:#e9dcc1; --ink-dim:#b6a585; --ink-faint:#80735a;
  --gold:#cfa450; --gold-bright:#e8c878; --bronze:#8a6d3b;
  --line:#3a2c1c; --line2:#4d3a22;
  --ok:#7fae6b; --bad:#c2604f; --warn:#d8a64a;
  --c-brown:#7c4a2d; --c-grey:#8b929c; --c-blue:#2f6fb0;
  --c-yellow:#d9a420; --c-red:#b5362c; --c-green:#2e8b57; --c-purple:#7a4ea3;
  --r:10px; --r-sm:6px;
  --disp:'Cinzel',Georgia,'Times New Roman',serif;
  --body:'Spectral',Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #2a1d10 0%, transparent 55%),
    radial-gradient(80% 60% at 12% 8%, rgba(207,164,80,.10) 0%, transparent 45%),
    radial-gradient(80% 60% at 88% 6%, rgba(184,90,40,.10) 0%, transparent 45%),
    var(--bg);
  color:var(--ink); font-family:var(--body);
  font-size:16px; line-height:1.45; min-height:100vh;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
#app{max-width:1080px; margin:0 auto; padding:18px 16px 48px; min-height:100vh}
h1,h2,h3{font-family:var(--disp); font-weight:600; margin:0; letter-spacing:.04em}
b{color:var(--ink)}
button{font-family:var(--body); cursor:pointer; color:var(--ink); background:none; border:none}
button:focus-visible, input:focus-visible, .mode-btn:focus-visible, .handcard:focus-visible{
  outline:2px solid var(--gold-bright); outline-offset:2px;
}
.eyebrow{font-family:var(--disp); text-transform:uppercase; letter-spacing:.34em;
  font-size:11px; color:var(--gold); font-weight:600}

/* ---------------- HOME ---------------- */
.home{min-height:84vh; display:flex; flex-direction:column; justify-content:center; gap:30px}
.home-hero{text-align:center; padding-top:6px}
.home-hero h1{font-size:clamp(46px,12vw,108px); line-height:.86; letter-spacing:.08em;
  color:var(--ink); text-shadow:0 2px 0 #000, 0 0 38px rgba(207,164,80,.18)}
.home-hero h1 span{color:var(--gold);
  background:linear-gradient(180deg,var(--gold-bright),var(--bronze));
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
.home-hero .eyebrow{display:block; margin-bottom:14px}
.tag-line{max-width:560px; margin:18px auto 0; color:var(--ink-dim);
  font-size:17px; font-style:italic}
.home-modes{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
.mode-btn{display:flex; flex-direction:column; gap:8px; text-align:left;
  padding:20px 18px; border:1px solid var(--line2); border-radius:var(--r);
  background:linear-gradient(170deg,var(--panel2),var(--panel));
  transition:transform .14s ease, border-color .14s ease, box-shadow .14s ease;
  position:relative; overflow:hidden}
.mode-btn::before{content:""; position:absolute; inset:0 auto 0 0; width:3px;
  background:linear-gradient(180deg,var(--gold),var(--bronze)); opacity:.5}
.mode-btn:hover{transform:translateY(-3px); border-color:var(--gold);
  box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 0 0 1px rgba(207,164,80,.2)}
.mb-title{font-family:var(--disp); font-size:19px; font-weight:600; color:var(--ink)}
.mb-sub{font-size:13px; color:var(--ink-faint); line-height:1.35}
.home-foot{text-align:center; color:var(--ink-faint); font-size:13px;
  border-top:1px solid var(--line); padding-top:18px}
.home-foot b{color:var(--gold)}

/* ---------------- SETUP / LOBBY ENTRY ---------------- */
.setup{max-width:480px; margin:24px auto 0; display:flex; flex-direction:column; gap:18px}
.setup h2{font-size:30px; text-align:center}
.back{align-self:flex-start; color:var(--ink-dim); font-size:14px; padding:4px 2px}
.back:hover{color:var(--gold)}
.field{display:flex; align-items:center; justify-content:space-between; gap:14px;
  padding:13px 16px; border:1px solid var(--line2); border-radius:var(--r);
  background:var(--panel)}
.field>span{font-family:var(--disp); font-size:14px; letter-spacing:.04em}
.field input[type=text]{flex:1; min-width:0; background:var(--bg2); color:var(--ink);
  border:1px solid var(--line2); border-radius:var(--r-sm); padding:9px 11px;
  font-family:var(--body); font-size:15px}
.stepper{display:flex; align-items:center; gap:4px}
.stepper button{width:36px; height:36px; border:1px solid var(--line2); border-radius:var(--r-sm);
  background:var(--panel2); font-size:20px; line-height:1; color:var(--gold)}
.stepper button:hover{border-color:var(--gold); background:var(--panel3)}
.stepper b{min-width:34px; text-align:center; font-family:var(--disp); font-size:20px; color:var(--ink)}
.names{display:flex; flex-direction:column; gap:8px}
.name-row{display:flex; align-items:center; gap:10px}
.name-row input{flex:1; background:var(--bg2); color:var(--ink); border:1px solid var(--line2);
  border-radius:var(--r-sm); padding:9px 11px; font-family:var(--body); font-size:15px}
.seat-tag{font-family:var(--disp); font-size:11px; letter-spacing:.08em; padding:4px 8px;
  border-radius:99px; min-width:42px; text-align:center; border:1px solid var(--line2)}
.seat-tag.you{background:rgba(207,164,80,.16); color:var(--gold-bright); border-color:var(--bronze)}
.seat-tag.bot{background:var(--panel2); color:var(--ink-faint)}
.toggle{display:grid; grid-template-columns:auto 1fr; gap:4px 10px; align-items:center;
  padding:13px 16px; border:1px solid var(--line2); border-radius:var(--r); background:var(--panel);
  cursor:pointer}
.toggle input{width:18px; height:18px; accent-color:var(--gold); grid-row:span 2}
.toggle span{font-family:var(--disp); font-size:14px; letter-spacing:.04em}
.toggle small{grid-column:2; color:var(--ink-faint); font-size:12px}
.primary,.secondary{font-family:var(--disp); letter-spacing:.06em; font-size:15px; font-weight:600;
  padding:14px 18px; border-radius:var(--r); text-align:center; transition:filter .14s, transform .1s}
.primary{background:linear-gradient(180deg,var(--gold),var(--bronze)); color:#231708;
  border:1px solid var(--gold-bright); box-shadow:0 6px 18px rgba(207,164,80,.22)}
.primary:hover{filter:brightness(1.08)} .primary:active{transform:translateY(1px)}
.secondary{background:var(--panel2); border:1px solid var(--line2); color:var(--ink)}
.secondary:hover{border-color:var(--gold)}
.or{text-align:center; color:var(--ink-faint); font-size:12px; letter-spacing:.2em;
  text-transform:uppercase; position:relative}
.or::before,.or::after{content:""; position:absolute; top:50%; width:32%; height:1px; background:var(--line2)}
.or::before{left:0} .or::after{right:0}
.note{color:var(--ink-faint); font-size:12.5px; text-align:center; line-height:1.5}
.warn{background:rgba(216,166,74,.1); border:1px solid var(--bronze); border-radius:var(--r);
  padding:14px 16px; color:var(--ink-dim); font-size:14px}

/* ---------------- LOBBY ---------------- */
.lobby{max-width:480px; margin:24px auto 0; display:flex; flex-direction:column; gap:16px; text-align:center}
.lobby .back{align-self:flex-start}
.roomcode{font-family:var(--disp); font-size:54px; letter-spacing:.22em; font-weight:700;
  color:var(--gold-bright); text-shadow:0 0 30px rgba(207,164,80,.3)}
.lobby-sub{color:var(--ink-dim); font-style:italic}
.seats{display:flex; flex-wrap:wrap; gap:8px; justify-content:center}
.seat-chip{padding:8px 14px; border-radius:99px; border:1px solid var(--line2);
  background:var(--panel2); font-size:14px; color:var(--ink-dim)}
.seat-chip.me{border-color:var(--gold); color:var(--gold-bright); background:rgba(207,164,80,.12)}
.seat-chip b{color:var(--gold-bright); font-weight:600}
.seat-chip i{color:var(--ink-faint); font-style:italic}
.wsel option:disabled{color:var(--ink-faint)}
.pick-hint{font-size:12px; color:var(--ink-faint); font-style:italic; margin-top:-6px}
.dot-wait{display:flex; align-items:center; gap:8px; justify-content:center; color:var(--ink-faint);
  font-size:13px; text-transform:uppercase; letter-spacing:.16em}
.dot{width:8px; height:8px; border-radius:99px; background:var(--ok); display:inline-block;
  animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3} 50%{opacity:1}}

/* ---------------- GAME: TOP BAR ---------------- */
.game{display:flex; flex-direction:column; gap:14px}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  padding:10px 14px; border:1px solid var(--line2); border-radius:var(--r);
  background:linear-gradient(180deg,var(--panel2),var(--panel))}
.age-track{display:flex; gap:6px}
.age-pip{font-family:var(--disp); font-weight:700; font-size:14px; width:34px; height:34px;
  display:grid; place-items:center; border-radius:8px; border:1px solid var(--line2);
  color:var(--ink-faint); background:var(--bg2)}
.age-pip.done{color:var(--bronze); border-color:var(--bronze)}
.age-pip.on{color:#231708; background:linear-gradient(180deg,var(--gold-bright),var(--bronze));
  border-color:var(--gold-bright); box-shadow:0 0 16px rgba(207,164,80,.4)}
.turn-info{font-family:var(--disp); font-size:13px; letter-spacing:.04em; color:var(--ink-dim);
  flex:1; text-align:center; min-width:160px}
.top-right{display:flex; align-items:center; gap:8px}
.coinbox{font-family:var(--disp); font-weight:600; color:var(--gold-bright);
  background:rgba(207,164,80,.12); border:1px solid var(--bronze); border-radius:99px;
  padding:6px 12px; font-size:14px}
.ghost{border:1px solid var(--line2); border-radius:var(--r-sm); padding:7px 11px;
  font-size:13px; color:var(--ink-dim); background:var(--panel2)}
.ghost:hover{border-color:var(--gold); color:var(--gold)}

/* ---------------- OPPONENT CITIES ---------------- */
.opponents{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px}
.city{border:1px solid var(--line2); border-radius:var(--r); background:var(--panel);
  padding:11px 12px; cursor:pointer; transition:border-color .14s, transform .1s; display:flex;
  flex-direction:column; gap:7px}
.city:hover{border-color:var(--gold); transform:translateY(-2px)}
.city.nb-left{box-shadow:inset 3px 0 0 var(--bronze)}
.city.nb-right{box-shadow:inset -3px 0 0 var(--bronze)}
.city-head{display:flex; align-items:baseline; justify-content:space-between; gap:6px}
.city-name{font-family:var(--disp); font-size:15px; font-weight:600; color:var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.nb-tag{font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--bronze);
  border:1px solid var(--bronze); border-radius:99px; padding:1px 6px; flex:none}
.city-wonder{font-size:12px; color:var(--ink-dim); display:flex; align-items:center; gap:6px}
.wpips{display:inline-flex; gap:3px}
.wpips i{width:8px; height:8px; border-radius:2px; background:var(--line2);
  border:1px solid var(--line2); display:inline-block}
.wpips i.f{background:linear-gradient(180deg,var(--gold-bright),var(--bronze)); border-color:var(--gold)}
.city-row{display:flex; flex-wrap:wrap; gap:4px}
.cdot{font-family:var(--disp); font-size:12px; font-weight:600; min-width:20px; height:20px; padding:0 5px;
  display:inline-grid; place-items:center; border-radius:5px; color:#fff;
  background:var(--col,#555); box-shadow:inset 0 -2px 4px rgba(0,0,0,.35)}
.cdot.empty{opacity:.18; min-width:14px; width:14px; padding:0}
.cdot[data-col=brown]{--col:var(--c-brown)} .cdot[data-col=grey]{--col:var(--c-grey); color:#1a1a1a}
.cdot[data-col=blue]{--col:var(--c-blue)} .cdot[data-col=yellow]{--col:var(--c-yellow); color:#241b06}
.cdot[data-col=green]{--col:var(--c-green)} .cdot[data-col=red]{--col:var(--c-red)}
.cdot[data-col=purple]{--col:var(--c-purple)}
.city-stats{display:flex; flex-wrap:wrap; gap:9px; font-size:12.5px; color:var(--ink-dim);
  border-top:1px solid var(--line); padding-top:6px}
.city-stats .pos{color:var(--ok)} .city-stats .neg{color:var(--bad)}
.s-mil{color:var(--c-red)} .s-sci{color:var(--c-green)}

/* ---------------- MY AREA: WONDER (SIGNATURE) ---------------- */
.myarea{display:grid; grid-template-columns:minmax(280px,420px) 1fr; gap:14px; align-items:start}
.wonder{border-radius:var(--r); padding:16px 16px 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%),
    repeating-linear-gradient(90deg, transparent 0 18px, rgba(0,0,0,.08) 18px 19px),
    linear-gradient(160deg,#332a1f,#241d14);
  border:1px solid var(--line2); position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05)}
.wonder::after{content:""; position:absolute; inset:6px; border:1px solid rgba(207,164,80,.18);
  border-radius:6px; pointer-events:none}
.wonder-name{font-family:var(--disp); font-size:21px; font-weight:700; color:var(--gold-bright);
  letter-spacing:.05em; text-shadow:0 1px 0 #000}
.wonder-sub{font-size:11.5px; color:var(--ink-faint); margin:3px 0 12px; line-height:1.4}
.stages{display:flex; gap:8px}
.stage{flex:1; min-height:96px; border-radius:var(--r-sm); padding:8px 6px;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:6px;
  background:linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.12));
  border:1px solid var(--line2); position:relative; text-align:center}
.stage::before{content:""; position:absolute; inset:0; border-radius:var(--r-sm);
  box-shadow:inset 0 0 14px rgba(0,0,0,.5)}
.stage.built{background:linear-gradient(180deg, rgba(207,164,80,.32), rgba(138,109,59,.18));
  border-color:var(--gold)}
.stage.built::before{box-shadow:inset 0 0 18px rgba(207,164,80,.4)}
.stage-cost{display:flex; flex-wrap:wrap; gap:3px; justify-content:center; min-height:20px}
.stage-reward{font-family:var(--disp); font-weight:700; font-size:14px; color:var(--gold-bright);
  text-shadow:0 1px 0 #000}
.stage.built .stage-reward{color:#fff}

/* ---------------- TABLEAU ---------------- */
.tableau{display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; min-height:120px;
  padding:6px; border:1px dashed var(--line2); border-radius:var(--r); background:rgba(0,0,0,.14)}
.tcol{position:relative; width:100px; flex:none}
.tcard{position:absolute; left:0; right:0; height:42px; border-radius:6px; padding:5px 7px;
  border:1px solid rgba(0,0,0,.35); border-left:4px solid rgba(255,255,255,.4);
  box-shadow:0 3px 8px rgba(0,0,0,.4); overflow:hidden; background:var(--cardbg,#444);
  color:#fff}
.tc-name{display:block; font-family:var(--disp); font-size:10px; font-weight:600; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 1px rgba(0,0,0,.5)}
.tc-eff{display:flex; flex-wrap:wrap; gap:3px; font-size:10px; margin-top:2px}
.empty-note{color:var(--ink-faint); font-style:italic; font-size:13px; padding:16px; margin:auto}

/* ---------------- HAND ---------------- */
.handwrap{display:flex; flex-direction:column; gap:8px}
.hand-title{font-family:var(--disp); font-size:14px; letter-spacing:.06em; color:var(--gold);
  text-transform:uppercase}
.hand{display:flex; gap:10px; overflow-x:auto; padding:6px 2px 12px; scroll-snap-type:x proximity}
.handcard{flex:0 0 150px; scroll-snap-align:start; border-radius:var(--r); padding:11px 12px;
  background:linear-gradient(178deg,var(--panel2),var(--panel)); border:1px solid var(--line2);
  border-top:4px solid var(--cardbg,#555); cursor:pointer; min-height:140px;
  display:flex; flex-direction:column; gap:7px; transition:transform .12s, border-color .12s, box-shadow .12s}
.handcard:hover{transform:translateY(-5px); box-shadow:0 12px 26px rgba(0,0,0,.45)}
.handcard.static{cursor:default} .handcard.static:hover{transform:none; box-shadow:none}
.hc-head{display:flex} .hc-name{font-family:var(--disp); font-size:14px; font-weight:600; line-height:1.15; color:var(--ink)}
.hc-cost{display:flex; flex-wrap:wrap; gap:4px; min-height:22px}
.hc-eff{display:flex; flex-wrap:wrap; gap:4px; align-items:center; flex:1; align-content:flex-start; font-size:12px; color:var(--ink-dim)}
.hc-chain{font-size:10.5px; color:var(--ink-faint); font-style:italic}
.hc-flags{display:flex; gap:6px; border-top:1px solid var(--line); padding-top:6px; font-style:normal}
.hc-flags i{font-style:normal; font-size:11px; letter-spacing:.04em; padding:2px 6px; border-radius:99px}
.hc-flags i.ok{color:var(--ok); border:1px solid rgba(127,174,107,.4); background:rgba(127,174,107,.1)}
.hc-flags i.no{color:var(--ink-faint); border:1px solid var(--line2)}
.locked-note{color:var(--ink-dim); font-style:italic; padding:18px 4px}

/* card color mapping (hand + tableau + sheet) */
.c-brown{--cardbg:var(--c-brown)} .c-grey{--cardbg:var(--c-grey)} .c-blue{--cardbg:var(--c-blue)}
.c-yellow{--cardbg:var(--c-yellow)} .c-red{--cardbg:var(--c-red)} .c-green{--cardbg:var(--c-green)}
.c-purple{--cardbg:var(--c-purple)}

/* ---------------- INLINE ICON CHIPS ---------------- */
.res{display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 4px;
  border-radius:5px; font-size:10.5px; font-weight:600; font-family:var(--disp);
  color:#fff; background:var(--rc,#555); box-shadow:inset 0 -2px 3px rgba(0,0,0,.35); line-height:1}
.res sub{font-size:8px; margin-left:1px}
.coin{display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 5px;
  border-radius:99px; font-family:var(--disp); font-size:11px; font-weight:700; color:#241b06;
  background:radial-gradient(circle at 35% 30%,var(--gold-bright),var(--bronze)); line-height:1}
.free{font-style:italic; color:var(--ink-faint); font-size:12px}
.vp{color:var(--c-blue); font-weight:600; font-family:var(--disp)}
.mil{color:var(--c-red); letter-spacing:-1px}
.sci{color:var(--c-green); font-size:15px}
.choice{display:inline-flex; align-items:center; gap:1px}
.tag{font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-faint);
  border:1px solid var(--line2); border-radius:99px; padding:1px 6px}

/* ---------------- ONLINE STATUS ---------------- */
.online-status{text-align:center; color:var(--ink-dim); font-size:13px; font-style:italic;
  border-top:1px solid var(--line); padding-top:10px}
.online-status b{color:var(--gold-bright); font-style:normal}

/* ---------------- PANEL / SHEETS ---------------- */
.panel-host{position:fixed; inset:0; z-index:40; display:none}
.panel-host.open{display:block}
.panel-backdrop{position:absolute; inset:0; background:rgba(8,5,2,.7); backdrop-filter:blur(2px);
  animation:fade .18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:absolute; left:50%; bottom:0; transform:translateX(-50%);
  width:min(560px,100%); background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line2); border-bottom:none; border-radius:16px 16px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:10px;
  box-shadow:0 -16px 50px rgba(0,0,0,.6); animation:rise .22s cubic-bezier(.2,.8,.2,1); max-height:88vh; overflow:auto}
.sheet.wide{width:min(720px,100%)}
@keyframes rise{from{transform:translate(-50%,16px); opacity:.4}to{transform:translate(-50%,0); opacity:1}}
@media(min-width:680px){
  .sheet{bottom:auto; top:50%; transform:translate(-50%,-50%); border-radius:16px; border-bottom:1px solid var(--line2)}
  @keyframes rise{from{transform:translate(-50%,calc(-50% + 12px)); opacity:.4}to{transform:translate(-50%,-50%); opacity:1}}
}
.sheet-title{font-family:var(--disp); font-size:18px; font-weight:600; color:var(--gold-bright); letter-spacing:.04em}
.sheet-card{border-radius:var(--r); padding:12px 14px; border-left:5px solid var(--cardbg,#555);
  background:rgba(0,0,0,.22)}
.sc-name{font-family:var(--disp); font-size:17px; font-weight:600; color:var(--ink)}
.sc-eff{display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; font-size:13px; color:var(--ink-dim); align-items:center}
.sheet-acts{display:flex; flex-direction:column; gap:8px}
.act{text-align:left; display:flex; flex-direction:column; gap:2px; padding:12px 14px;
  border:1px solid var(--line2); border-radius:var(--r); background:var(--panel2); transition:border-color .12s, background .12s}
.act:hover:not(.disabled){border-color:var(--gold); background:var(--panel3)}
.act.disabled{opacity:.45; cursor:not-allowed}
.act.k-build{border-left:4px solid var(--ok)} .act.k-wonder{border-left:4px solid var(--gold)}
.act.k-discard{border-left:4px solid var(--ink-faint)}
.act-label{font-family:var(--disp); font-size:14px; font-weight:600; color:var(--ink)}
.act-sub{font-size:12px; color:var(--ink-faint)}
.sheet-cancel{margin-top:2px; padding:11px; border:1px solid var(--line2); border-radius:var(--r);
  color:var(--ink-dim); background:transparent; font-family:var(--disp); font-size:13px; letter-spacing:.06em}
.sheet-cancel:hover{border-color:var(--gold); color:var(--gold)}
.sheet .wonder{margin-top:4px} .sheet .tableau{margin-top:4px}
.rules p{margin:0 0 10px; font-size:14px; color:var(--ink-dim); line-height:1.6}
.rules b{color:var(--gold-bright)}
.logbox{display:flex; flex-direction:column; gap:4px; font-size:13px; color:var(--ink-dim);
  max-height:50vh; overflow:auto}
.logbox div{padding:5px 8px; border-left:2px solid var(--line2); background:rgba(0,0,0,.18); border-radius:0 6px 6px 0}

/* ---------------- PASS INTERSTITIAL ---------------- */
.passcard{min-height:80vh; display:grid; place-items:center; text-align:center}
.pass-inner{display:flex; flex-direction:column; gap:14px; align-items:center; max-width:380px}
.pass-inner h2{font-size:38px; color:var(--gold-bright)}
.pass-inner p{color:var(--ink-dim); font-style:italic; margin:0}
.pass-inner .primary{margin-top:10px; width:100%}

/* ---------------- SCORE ---------------- */
.scorescreen{max-width:760px; margin:18px auto 0; display:flex; flex-direction:column; gap:18px; text-align:center}
.scorescreen .win{font-size:34px; color:var(--gold-bright); text-shadow:0 0 30px rgba(207,164,80,.3)}
.scoretable{width:100%; border-collapse:collapse; font-size:13px; overflow:hidden;
  border:1px solid var(--line2); border-radius:var(--r)}
.scoretable th,.scoretable td{padding:9px 7px; text-align:center; border-bottom:1px solid var(--line)}
.scoretable th{font-family:var(--disp); font-size:11px; letter-spacing:.04em; color:var(--gold);
  text-transform:uppercase; background:var(--panel2)}
.scoretable td.nm{font-family:var(--disp); color:var(--ink); text-align:left; white-space:nowrap}
.scoretable td.tot{font-family:var(--disp); font-weight:700; color:var(--gold-bright); font-size:15px}
.scoretable tr.first td{background:rgba(207,164,80,.1)}
.scoretable tbody tr:last-child td{border-bottom:none}
.scorescreen .primary{align-self:center; min-width:200px}

/* ---------------- TOAST ---------------- */
#toast{position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px);
  background:var(--panel3); color:var(--ink); border:1px solid var(--gold); border-radius:99px;
  padding:11px 20px; font-size:14px; z-index:60; opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s; box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1; transform:translate(-50%,0)}

/* ---------------- EMBLEMS & NEW FEATURE STYLES ---------------- */
.c-leader{--cardbg:var(--gold)}
.emblem{display:block; flex:none; border-radius:12px}
.hc-head{display:flex; align-items:center; gap:8px}
.hc-head .emblem{border-radius:8px}
.hc-flags i.info{color:var(--gold); border:1px solid rgba(207,164,80,.4); background:rgba(207,164,80,.08)}
/* action sheet card now hosts emblem + body */
.sheet-card{display:flex; gap:13px; align-items:flex-start}
.sc-emblem{flex:none}
.sc-body{flex:1; min-width:0}
.sc-label{font-family:var(--disp); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:2px}
.sc-desc{font-size:12.5px; color:var(--ink-dim); margin-top:5px; line-height:1.5}
/* read-only card info sheet */
.card-info{display:flex; gap:14px; align-items:center; padding:2px 2px 4px}
.ci-emblem{flex:none}
.ci-label{font-family:var(--disp); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold)}
.ci-name{font-family:var(--disp); font-size:21px; font-weight:600; color:var(--ink); line-height:1.1; margin-top:3px}
.ci-costline{display:flex; align-items:center; gap:12px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:11px 2px; margin:4px 0}
.ci-costline>span{font-family:var(--disp); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint)}
.ci-cost{display:flex; gap:5px; flex-wrap:wrap; align-items:center}
.ci-costnote{color:var(--ink-faint); font-size:12px; font-style:italic}
.ci-desc{font-size:14px; color:var(--ink-dim); line-height:1.65; padding:2px 2px 4px}
/* setup + lobby nation picker */
.row-wonder{display:flex; align-items:center; gap:7px; flex:none}
.rw-emblem{flex:none; line-height:0}
.wsel{background:var(--bg2); color:var(--ink); border:1px solid var(--line2); border-radius:var(--r-sm);
  padding:8px 9px; font-family:var(--body); font-size:13.5px; max-width:130px}
.wsel:focus{border-color:var(--gold); outline:none}
/* leader explainer */
.leader-note{font-size:12.5px; color:var(--ink-dim); background:rgba(207,164,80,.08);
  border:1px solid var(--bronze); border-radius:var(--r-sm); padding:9px 12px; line-height:1.5; font-style:italic}
/* wonder board header with emblem */
.wonder-head{display:flex; gap:11px; align-items:center; margin-bottom:12px}
.wonder-head .wonder-sub{margin:2px 0 0}
/* per-card details button (reliable tap target, esp. on mobile) */
.hc-flags{align-items:center; flex-wrap:wrap}
.hc-info{font-family:var(--body); font-size:11px; letter-spacing:.02em; color:var(--gold);
  border:1px solid rgba(207,164,80,.45); background:rgba(207,164,80,.1); border-radius:99px;
  padding:4px 9px; cursor:pointer; margin-left:auto; line-height:1; white-space:nowrap}
.hc-info:hover{background:rgba(207,164,80,.2); border-color:var(--gold)}
.hc-info:active{transform:translateY(1px)}
/* hand: keep the leftmost card flush at the start */
.hand{scroll-padding-left:2px}
/* home: how-to-play entry */
.home-learn{display:block; margin:0 auto; font-family:var(--disp); letter-spacing:.04em; font-size:14px;
  color:var(--gold); background:rgba(207,164,80,.08); border:1px solid var(--bronze); border-radius:99px;
  padding:11px 22px; transition:background .14s, border-color .14s}
.home-learn:hover{background:rgba(207,164,80,.18); border-color:var(--gold)}
/* detailed guide */
.guide .rules h4{font-family:var(--disp); font-size:15px; font-weight:600; color:var(--gold-bright);
  letter-spacing:.04em; margin:18px 0 6px; padding-top:12px; border-top:1px solid var(--line)}
.guide .rules h4:first-child{border-top:none; padding-top:0; margin-top:2px}
.guide .rules p .cdot{vertical-align:middle; margin-right:4px}
.guide .rules p .emblem{vertical-align:middle; display:inline-block; margin:0 1px}

/* ---------------- RESPONSIVE ---------------- */
@media(max-width:680px){
  #app{padding:14px 12px 40px}
  .home-modes{grid-template-columns:1fr}
  .myarea{grid-template-columns:1fr}
  .name-row{flex-wrap:wrap}
  .name-row input{flex:1 1 100%; order:3}
  .opponents{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .topbar{gap:8px} .turn-info{order:3; flex-basis:100%; text-align:left}
  .home-hero h1{letter-spacing:.04em}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important}
}

<script>
/* ============================================================

(function (root) {

  /* ----------------------------------------------------------

  function C(o) { o.cost = o.cost || cost(0); return o; }

  const CARDS = [

    C({ name: 'Loom', color: 'grey', age: 1, minP: [3, 6], produce: { loom: 1 } }),

    C({ name: 'Pawnshop', color: 'blue', age: 1, minP: [4, 7], vp: 3 }),

    C({ name: 'Altar', color: 'blue', age: 1, minP: [3, 5], vp: 2, chainTo: ['Temple'] }),

    C({ name: 'Tavern', color: 'yellow', age: 1, minP: [4, 5, 7], coins: 5 }),

    // Red military
    C({ name: 'Stockade', color: 'red', age: 1, minP: [3, 7], cost: cost(0, { wood: 1 }), shields: 1 }),
    C({ name: 'Barracks', color: 'red', age: 1, minP: [3, 5], cost: cost(0, { ore: 1 }), shields: 1 }),
    C({ name: 'Guard Tower', color: 'red', age: 1, minP: [3, 4], cost: cost(0, { clay: 1 }), shields: 1 }),
    // Green science
    C({ name: 'Apothecary', color: 'green', age: 1, minP: [3, 5], cost: cost(0, { loom: 1 }), science: 'compass', chainTo: ['Stables', 'Dispensary'] }),
    C({ name: 'Workshop', color: 'green', age: 1, minP: [3, 7], cost: cost(0, { glass: 1 }), science: 'gear', chainTo: ['Archery Range', 'Laboratory'] }),
    C({ name: 'Scriptorium', color: 'green', age: 1, minP: [3, 4], cost: cost(0, { papyrus: 1 }), science: 'tablet', chainTo: ['Courthouse', 'Library'] }),

    // ================= AGE II =================
    // Brown
    C({ name: 'Sawmill', color: 'brown', age: 2, minP: [3, 4], cost: cost(1), produce: { wood: 2 } }),
    C({ name: 'Quarry', color: 'brown', age: 2, minP: [3, 4], cost: cost(1), produce: { stone: 2 } }),
    C({ name: 'Brickyard', color: 'brown', age: 2, minP: [3, 4], cost: cost(1), produce: { clay: 2 } }),

    C({ name: 'Caravansery', color: 'yellow', age: 2, minP: [3, 5, 6], cost: cost(0, { wood: 2 }), choice: [{ wood: 1 }, { stone: 1 }, { ore: 1 }, { clay: 1 }], chainFrom: ['Marketplace'], chainTo: ['Lighthouse'] }),
    C({ name: 'Vineyard', color: 'yellow', age: 2, minP: [3, 6], effect: { coinPer: { color: 'brown', scope: 'all', coins: 1 } } }),

    C({ name: 'Stables', color: 'red', age: 2, minP: [3, 5], cost: cost(0, { ore: 1, clay: 1, wood: 1 }), shields: 2, chainFrom: ['Apothecary'] }),
    C({ name: 'Archery Range', color: 'red', age: 2, minP: [3, 6], cost: cost(0, { wood: 2, ore: 1 }), shields: 2, chainFrom: ['Workshop'] }),
    // Green
    C({ name: 'Dispensary', color: 'green', age: 2, minP: [3, 4], cost: cost(0, { ore: 2, glass: 1 }), science: 'compass', chainFrom: ['Apothecary'], chainTo: ['Lodge', 'Arena'] }),
    C({ name: 'Laboratory', color: 'green', age: 2, minP: [3, 5], cost: cost(0, { clay: 2, papyrus: 1 }), science: 'gear', chainFrom: ['Workshop'], chainTo: ['Siege Workshop', 'Observatory'] }),
    C({ name: 'Library', color: 'green', age: 2, minP: [3, 6], cost: cost(0, { stone: 2, loom: 1 }), science: 'tablet', chainFrom: ['Scriptorium'], chainTo: ['Senate', 'University'] }),
    C({ name: 'School', color: 'green', age: 2, minP: [3, 7], cost: cost(0, { wood: 1, papyrus: 1 }), science: 'tablet', chainTo: ['Academy', 'Study'] }),

    // ================= AGE III =================
    // Blue
    C({ name: 'Pantheon', color: 'blue', age: 3, minP: [3, 6], cost: cost(0, { clay: 2, ore: 1, glass: 1, papyrus: 1, loom: 1 }), vp: 7, chainFrom: ['Temple'] }),
    C({ name: 'Gardens', color: 'blue', age: 3, minP: [3, 4], cost: cost(0, { clay: 2, wood: 1 }), vp: 5, chainFrom: ['Statue'] }),
    C({ name: 'Town Hall', color: 'blue', age: 3, minP: [3, 5, 6], cost: cost(0, { stone: 2, ore: 1, glass: 1 }), vp: 6 }),
    C({ name: 'Palace', color: 'blue', age: 3, minP: [3, 7], cost: cost(0, { wood: 1, stone: 1, ore: 1, clay: 1, glass: 1, papyrus: 1, loom: 1 }), vp: 8 }),
    C({ name: 'Senate', color: 'blue', age: 3, minP: [3, 5], cost: cost(0, { wood: 2, stone: 1, ore: 1 }), vp: 6, chainFrom: ['Library'] }),
    // Yellow
    C({ name: 'Haven', color: 'yellow', age: 3, minP: [3, 4], cost: cost(0, { loom: 1, ore: 1, wood: 1 }), effect: { coinVpPer: { color: 'brown', scope: 'self', coins: 1, vp: 1 } }, chainFrom: ['Forum'] }),
    C({ name: 'Lighthouse', color: 'yellow', age: 3, minP: [3, 6], cost: cost(0, { stone: 1, glass: 1 }), effect: { coinVpPer: { color: 'yellow', scope: 'self', coins: 1, vp: 1 } }, chainFrom: ['Caravansery'] }),

    C({ name: 'Arena', color: 'yellow', age: 3, minP: [3, 5, 7], cost: cost(0, { stone: 2, ore: 1 }), effect: { coinVpPerStage: { coins: 3, vp: 1 } }, chainFrom: ['Dispensary'] }),
    // Red
    C({ name: 'Fortifications', color: 'red', age: 3, minP: [3, 7], cost: cost(0, { ore: 3, stone: 1 }), shields: 3, chainFrom: ['Walls'] }),
    C({ name: 'Circus', color: 'red', age: 3, minP: [4, 5, 6], cost: cost(0, { stone: 3, ore: 2 }), shields: 3, chainFrom: ['Training Ground'] }),
    C({ name: 'Arsenal', color: 'red', age: 3, minP: [3, 4, 7], cost: cost(0, { wood: 3, ore: 2, loom: 1 }), shields: 3 }),
    C({ name: 'Siege Workshop', color: 'red', age: 3, minP: [3, 5], cost: cost(0, { clay: 3, wood: 1 }), shields: 3, chainFrom: ['Laboratory'] }),
    // Green
    C({ name: 'Lodge', color: 'green', age: 3, minP: [3, 6], cost: cost(0, { clay: 2, loom: 1, papyrus: 1 }), science: 'compass', chainFrom: ['Dispensary'] }),
    C({ name: 'Observatory', color: 'green', age: 3, minP: [3, 7], cost: cost(0, { ore: 2, glass: 1, loom: 1 }), science: 'gear', chainFrom: ['Laboratory'] }),
    C({ name: 'University', color: 'green', age: 3, minP: [3, 4], cost: cost(0, { wood: 2, papyrus: 1, glass: 1 }), science: 'tablet', chainFrom: ['Library'] }),
    C({ name: 'Academy', color: 'green', age: 3, minP: [3, 7], cost: cost(0, { stone: 3, glass: 1 }), science: 'compass', chainFrom: ['School'] }),
    C({ name: 'Study', color: 'green', age: 3, minP: [3, 5], cost: cost(0, { wood: 1, papyrus: 1, loom: 1 }), science: 'gear', chainFrom: ['School'] }),

    // Purple guilds (count depends on players; we tag age:3 color:purple)
    C({ name: 'Workers Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { ore: 2, clay: 1, stone: 1, wood: 1 }), effect: { vpPer: { color: 'brown', scope: 'neighbors', vp: 1 } } }),
    C({ name: 'Craftsmens Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { ore: 2, stone: 2 }), effect: { vpPer: { color: 'grey', scope: 'neighbors', vp: 2 } } }),
    C({ name: 'Magistrates Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { wood: 3, stone: 1, loom: 1 }), effect: { vpPer: { color: 'blue', scope: 'neighbors', vp: 1 } } }),
    C({ name: 'Traders Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { loom: 1, papyrus: 1, glass: 1 }), effect: { vpPer: { color: 'yellow', scope: 'neighbors', vp: 1 } } }),
    C({ name: 'Philosophers Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { clay: 3, loom: 1, papyrus: 1 }), effect: { vpPer: { color: 'green', scope: 'neighbors', vp: 1 } } }),
    C({ name: 'Spies Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { clay: 3, glass: 1 }), effect: { vpPer: { color: 'red', scope: 'neighbors', vp: 1 } } }),
    C({ name: 'Strategists Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { ore: 2, stone: 1, loom: 1 }), effect: { vpPerDefeat: { vp: 1 } } }),
    C({ name: 'Shipowners Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { wood: 3, glass: 1, papyrus: 1 }), effect: { vpPer: { color: ['brown', 'grey', 'purple'], scope: 'self', vp: 1 } } }),
    C({ name: 'Scientists Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { wood: 2, ore: 2, papyrus: 1 }), effect: { scienceWild: true } }),
    C({ name: 'Builders Guild', color: 'purple', age: 3, guild: true, cost: cost(0, { stone: 2, clay: 2, glass: 1 }), effect: { vpPerStage: { scope: 'selfNeighbors', vp: 1 } } }),
  ];

  /* ----------------------------------------------------------
     WONDERS (A-side stages). startRes given free each turn.
     stages: [{cost:{res}, effect:{...}}]
     ---------------------------------------------------------- */
  const WONDERS = [
    {
      name: 'The Colossus of Rhodes', short: 'Rhodes', start: 'ore',
      stages: [
        { cost: { wood: 2 }, effect: { vp: 3 } },
        { cost: { clay: 3 }, effect: { shields: 2 } },
        { cost: { ore: 4 }, effect: { vp: 7 } },
      ],
    },
    {
      name: 'The Lighthouse of Alexandria', short: 'Alexandria', start: 'glass',
      stages: [

     SCORING
     ---------------------------------------------------------- */
  function countColor(player, color) {
    const colors = Array.isArray(color) ? color : [color];

  }
  function scienceSymbols(player) {

    (player.stagesBuilt || []).forEach(si => { const e = player.wonder.stages[si].effect; if (e.science) sym[e.science]++; if (e.scienceWild) wild++; });

<script>
/* ============================================================
   SEVEN WONDERS — Game flow + AI bot (built on engine.js)
   ============================================================ */
(function (root, SW) {
  'use strict';

  function newGame(opts) {
    // opts: { seats:[{id,name,bot}], wonders?:[shortNames], useLeaders:bool }
    const seats = opts.seats;
    const n = seats.length;
    const wpool = SW.shuffle(SW.WONDERS.slice());
    const used = new Set();
    function pickWonder(choice) {
      if (choice) {
        const w = SW.WONDERS.find(x => x.short === choice || x.name === choice);
        if (w && !used.has(w.short)) { used.add(w.short); return w; }
      }
      for (const w of wpool) { if (!used.has(w.short)) { used.add(w.short); return w; } }
      return wpool[0];
    }
    const players = seats.map((s, i) => {
      const w = pickWonder(opts.wonders && opts.wonders[i]);
      return {
        id: s.id, name: s.name, bot: !!s.bot, seat: i,
        wonder: w, built: [], stagesBuilt: [], coins: 3,
        military: 0, defeats: 0, warTokens: [],
        leaders: [], leaderHand: [],
        hand: [], pendingMove: null,
        freeBuildTokens: 0, usedFreeThisAge: false,
        builtNamesEver: {},
      };
    });
    const g = {
      players, n, age: 1, turn: 1, phase: 'play',
      useLeaders: !!opts.useLeaders,
      discard: [], log: [], version: 1,
      direction: 1, // age1 pass left (to higher seat), age2 right, age3 left
    };
    if (g.useLeaders) {
      dealLeaders(g);
      g.phase = 'leaderDraft';
    } else {
      startAge(g, 1);
    }
    return g;
  }

  function dealLeaders(g) {
    const need = 4 * g.n;
    let base = SW.LEADERS.slice();
    let pool = [];
    while (pool.length < need) pool = pool.concat(base);
    pool = SW.shuffle(pool.map(l => SW.instCard(l))).slice(0, need);
    g.players.forEach(p => { p.leaderHand = pool.splice(0, 4); });
    g.leaderDraftRound = 1;
    g.direction = 1;
  }

  function startAge(g, age) {
    g.age = age; g.turn = 1; g.phase = 'play';
    g.direction = (age === 2) ? -1 : 1;
    const decks = SW.buildDeck(age, g.n);
    // distribute 7 to each player
    g.players.forEach((p, i) => { p.hand = decks.slice(i * 7, i * 7 + 7); p.usedFreeThisAge = false; p.pendingMove = null; });
    log(g, `— Age ${age} begins —`);
  }

  function log(g, msg) { g.log.push(msg); if (g.log.length > 200) g.log.shift(); }

  function neighbors(g, idx) {
    const n = g.n;
    return { left: g.players[(idx - 1 + n) % n], right: g.players[(idx + 1) % n] };
  }

  // ---- enumerate legal moves for player p in current hand ----
  function legalMoves(g, p) {
    const idx = p.seat;
    const nb = neighbors(g, idx);
    const moves = [];
    const hand = g.useLeaders && g.phase === 'leaderDraft' ? p.leaderHand : p.hand;
    hand.forEach(card => {
      if (g.phase === 'leaderDraft') {
        moves.push({ type: 'pickLeader', uid: card.uid, card });
        return;
      }
      // BUILD card
      const already = p.built.some(b => b.name === card.name) || p.leaders.some(l => l.name === card.name);
      if (card.color !== 'grey' && card.color !== 'brown' && already) {
        // cannot build duplicate named card (except resource cards duplicates allowed)
      } else {
        // chain free?
        let chainFree = false;
        if (card.chainFrom) chainFree = card.chainFrom.some(name => p.built.some(b => b.name === name));
        if (chainFree) {
          moves.push({ type: 'build', uid: card.uid, card, pay: { ok: true, coinsToNeighbors: 0, totalCoins: 0 }, free: true });
        } else {
          const pay = SW.payable(p, card, nb);
          if (pay.ok) moves.push({ type: 'build', uid: card.uid, card, pay });
        }
      }
      // BUILD WONDER STAGE using this card as currency
      const nextStage = p.stagesBuilt.length;
      if (nextStage < p.wonder.stages.length) {
        const stage = p.wonder.stages[nextStage];
        const fake = { name: 'wonderStage', cost: { coins: 0, res: discount(p, stage.cost) } };
        const pay = SW.payable(p, fake, nb);
        if (pay.ok) moves.push({ type: 'wonder', uid: card.uid, stageIndex: nextStage, pay });
      }
      // DISCARD for 3 coins (always legal during play)
      moves.push({ type: 'discard', uid: card.uid });

      if (p.freeBuildTokens > 0 && !p.usedFreeThisAge && card.color !== 'grey' && card.color !== 'brown') {
        if (!already) moves.push({ type: 'build', uid: card.uid, card, pay: { ok: true, coinsToNeighbors: 0, totalCoins: 0 }, free: true, viaToken: true });
      }
    });
    return moves;
  }

  function discount(p, resCost) {
    // wonderDiscount leaders reduce 1 of each resource type
    const has = p.leaders.some(l => l.effect && l.effect.wonderDiscount);
    const out = SW.cloneRes(resCost);

      const mv = p.pendingMove; if (!mv) return;

    passHands(g);

    // some effects you keep playing; standard: 6 turns then last card is discarded)
    const turnsThisAge = 6;

  function passHands(g) {
    const n = g.n;
    const hands = g.players.map(p => p.hand);

      p.hand = hands[from];

  function resolveLeaderPick(g) {
    g.players.forEach(p => {
      const mv = p.pendingMove; if (!mv) return;
      const ci = p.leaderHand.findIndex(c => c.uid === mv.uid);
      if (ci >= 0) { p.chosenLeader = p.leaderHand.splice(ci, 1)[0]; }

    g.players.forEach(p => { p.leadersChosen = p.leadersChosen || []; if (p.chosenLeader) { p.leadersChosen.push(p.chosenLeader); p.chosenLeader = null; } });

    g.players.forEach((p, i) => { const from = (i + 1) % n; p.leaderHand = hands[from]; });

    g.version++;

      // as they can afford; place them. (Simplified single-step recruit.)
      g.players.forEach(p => {

  function distributeTrade(g, buyer, pay) {
    // We didn't track which neighbor sold; approximate by splitting coins to
    // whichever neighbor(s) the solver used. For simplicity, the solver returned
    // coinsToNeighbors total. We credit left/right proportionally is hard; we
    // instead credit nothing-tracked. To keep economy correct, give coins to the
    // neighbor pool: here we credit both neighbors evenly is inaccurate. Instead,
    // recompute split.
    if (!pay || !pay.coinsToNeighbors) return;
    // Re-derive split using same greedy as payable but track sides.
    // Simplest faithful approach: the coins leave buyer (already deducted) and go
    // to neighbors. We approximate by giving all to the side that could supply.
    // For gameplay fairness we split based on recorded breakdown if present.
    if (pay.tradeSplit) {
      const nb = neighbors(g, buyer.seat);
      nb.left.coins += pay.tradeSplit.left || 0;
      nb.right.coins += pay.tradeSplit.right || 0;

        p.coins += cnt * e.coinPer.coins;

      if (e.coinVpPer) { let cnt = SW.countColor(p, e.coinVpPer.color); p.coins += cnt * e.coinVpPer.coins; }

  }

  function finalScore(g) {
    g.results = g.players.map((p, i) => ({ id: p.id, name: p.name, wonder: p.wonder.short, breakdown: SW.scoreBreakdown(p, g.players, i) }));
    g.results.sort((a, b) => b.breakdown.total - a.breakdown.total || b.breakdown.coins - a.breakdown.coins);
  }

     AI BOT — heuristic move selection
     ---------------------------------------------------------- */
  function botMove(g, p) {

      let best = moves[0], bestV = -1;

    if (e.science) v += 4; if (e.coins) v += e.coins * 0.3; if (e.freeBuildPerAge) v += 5;
    if (e.vpScienceSet) v += e.vpScienceSet * 0.5; if (e.wonderDiscount) v += 3;
    if (e.vpPerStage) v += 3; if (e.vpPerCoins) v += 1;

    if (m.type === 'wonder') {

      if (eff.shields) v += eff.shields * 3;
      if (eff.coins) v += eff.coins * 0.4;
      if (eff.scienceWild) v += 6; if (eff.produceChoice) v += 4; if (eff.freeBuildPerAge) v += 6;
      v -= ((m.pay && m.pay.coinsToNeighbors) || 0) * 0.6;
      return v;
    }
    // build
    let v = 0.5;
    const cost = (m.pay && m.pay.coinsToNeighbors) || 0;
    v -= cost * 0.7;
    switch (card.color) {
      case 'blue': v += (card.vp || 0) * 1.3; break;
      case 'red': v += (card.shields || 0) * 3.2; break;
      case 'green': v += 6.5; break; // science compounds
      case 'brown': case 'grey': v += 4 - g.age * 0.8; break; // resources early
      case 'yellow':

        if (card.coins) v += card.coins * 0.4;
        if (card.effect && (card.effect.coinVpPer || card.effect.coinVpPerStage)) v += 4;
        break;
      case 'purple':

        break;
    }
    if (card.chainTo && card.chainTo.length) v += 1.2; // sets up free chains
    // military pressure: if losing to neighbors, value red more
    if (card.color === 'red') {
      const myShields = SW.shieldsOf(p);
      const need = Math.max(SW.shieldsOf(nb.left), SW.shieldsOf(nb.right)) - myShields;
      if (need > 0) v += Math.min(need, 2) * 1.5;
    }
    return v;
  }

  // Drive all bots to commit moves for current turn.
  function autoCommitBots(g) {
    g.players.forEach(p => { if (p.bot && !p.pendingMove) { const m = botMove(g, p); commitMove(g, p.id, m); } });
  }

  // Convenience: run a whole game with all-bots (for testing).
  function simulate(opts) {
    const g = newGame(opts);
    let guard = 0;
    while (g.phase !== 'finished' && guard++ < 500) {
      autoCommitBots(g);
      // any non-bot would block; in sim all bots

    };
    const inner = W[short] || star(32, 32, 12, FG);
    return `<svg class="emblem" viewBox="0 0 64 64" width="${s}" height="${s}" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="12" fill="${WBG}"/><rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="rgba(207,164,80,.35)" stroke-width="1.5"/>${inner}</svg>`;
  }
  function placeholderEmblem(size) {
    const s = size || 56;
    return `<svg class="emblem" viewBox="0 0 64 64" width="${s}" height="${s}" aria-hidden="true"><rect x="2" y="2" width="60" height="60" rx="12" fill="#1c160e"/><rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="rgba(207,164,80,.25)" stroke-width="1.5" stroke-dasharray="4 4"/><text x="32" y="43" text-anchor="middle" font-size="30" fill="#cfa450" font-family="Cinzel,serif">?</text></svg>`;
  }

  // ---------- plain-language card descriptions (generated from effects) ----------
  const COLOR_LABEL = { brown: 'Raw material', grey: 'Manufactured good', blue: 'Civilian — victory points', yellow: 'Commercial', red: 'Military', green: 'Science', purple: 'Guild' };
  const RES_NAME = { wood: 'Wood', stone: 'Stone', clay: 'Clay', ore: 'Ore', glass: 'Glass', papyrus: 'Papyrus', loom: 'Loom' };
  function describe(card) {
    if (card.leader) return card.desc || 'A leader with a special ability you keep all game.';
    const parts = [];
    if (card.produce) { const ps = SW.RES.filter(r => card.produce[r]).map(r => card.produce[r] + ' ' + RES_NAME[r]); parts.push('Produces ' + ps.join(' and ') + ' every turn, used to build cards and to trade.'); }
    if (card.choice) { const o = card.choice.map(x => RES_NAME[Object.keys(x)[0]]); parts.push('Each turn produces one resource of your choice: ' + o.join(', ') + '.'); }
    if (card.vp) parts.push('Worth ' + card.vp + ' victory points at the end of the game.');
    if (card.shields) parts.push('Adds ' + card.shields + ' military shield' + (card.shields > 1 ? 's' : '') + '. Shields are compared with both neighbors at the end of each age.');
    if (card.science) { const n = { compass: 'Compass', gear: 'Gear', tablet: 'Tablet' }[card.science]; parts.push('Provides a ' + n + ' science symbol. Score the square of each symbol you collect, plus 7 points for every complete set of all three.'); }
    if (card.coins) parts.push('Gain ' + card.coins + ' coins immediately when built.');
    const e = card.effect || {};
    if (e.trade) { const k = e.trade.kind === 'raw' ? 'raw materials (brown cards)' : 'manufactured goods (grey cards)'; const side = e.trade.side === 'both' ? 'either neighbor' : (e.trade.side === 'left' ? 'your left neighbor' : 'your right neighbor'); parts.push('Buy ' + k + ' from ' + side + ' for 1 coin each instead of 2.'); }
    if (e.coinPer) { const c = e.coinPer; const who = c.scope === 'all' ? 'you and both neighbors own' : (c.scope === 'neighbors' ? 'your neighbors own' : 'you own'); parts.push('When built, gain ' + c.coins + ' coin' + (c.coins > 1 ? 's' : '') + ' for each ' + c.color + ' card ' + who + '.'); }
    if (e.coinVpPer) { const c = e.coinVpPer; parts.push('Gain ' + c.coins + ' coin' + (c.coins > 1 ? 's' : '') + ' now, and ' + c.vp + ' victory point' + (c.vp > 1 ? 's' : '') + ' at game end, for each ' + c.color + ' card in your own city.'); }
    if (e.coinVpPerStage) parts.push('Gain ' + e.coinVpPerStage.coins + ' coins now and ' + e.coinVpPerStage.vp + ' victory point per Wonder stage you have built.');
    if (e.vpPer) { const c = e.vpPer; const cols = Array.isArray(c.color) ? c.color.join('/') : c.color; const who = c.scope === 'neighbors' ? 'each neighbor city' : (c.scope === 'self' ? 'your own city' : 'you and your neighbors'); parts.push('At game end, ' + c.vp + ' victory point' + (c.vp > 1 ? 's' : '') + ' for each ' + cols + ' card in ' + who + '.'); }
    if (e.vpPerDefeat) parts.push('At game end, 1 victory point for each military defeat token your two neighbors hold.');
    if (e.vpPerStage) { const who = e.vpPerStage.scope === 'selfNeighbors' ? 'you and both neighbors have' : 'you have'; parts.push('At game end, 1 victory point for each Wonder stage ' + who + ' built.'); }
    if (e.scienceWild) parts.push('Counts as any one science symbol of your choice when scoring.');
    if (card.color === 'purple' && !parts.length) parts.push('A guild that scores victory points at the end of the game.');
    if (card.chainFrom && card.chainFrom.length) parts.push('Free to build if you already own ' + card.chainFrom.join(' or ') + '.');
    if (card.chainTo && card.chainTo.length) parts.push('Owning this lets you later build ' + card.chainTo.join(' or ') + ' for free.');
    return parts.join(' ');
  }

  // ---------- app state ----------
  const App = {
    screen: 'home',
    g: null,
    mode: null,            // 'bots' | 'hotseat' | 'online'
    viewSeat: 0,           // seat currently shown
    online: null,          // {code, seat, isHost}
    pendingPass: false,    // hotseat interstitial
    selectedUid: null,
    storageKeyPrefix: 'sw1_',
  };

  // ---------- screens ----------
  const rootEl = () => $('#app');

  function show(screen) { App.screen = screen; render(); }

  function render() {
    const r = rootEl();
    if (App._lastScreen !== App.screen) { closePanel(); App._lastScreen = App.screen; }
    r.innerHTML = '';
    if (App.screen === 'home') return renderHome(r);
    if (App.screen === 'setup') return renderSetup(r);
    if (App.screen === 'lobby') return renderLobby(r);
    if (App.screen === 'game') return renderGame(r);
    if (App.screen === 'pass') return renderPass(r);
    if (App.screen === 'score') return renderScore(r);
  }

  // ===== HOME =====
  function renderHome(r) {
    const wrap = el('div', 'home');
    wrap.innerHTML = `
      <div class="home-hero">
        <div class="eyebrow">A game of antiquity</div>
        <h1>SEVEN<br><span>WONDERS</span></h1>
        <p class="tag-line">Draft cards, raise a wonder of the ancient world, out-build seven rival cities across three ages.</p>
      </div>
      <div class="home-modes">
        <button class="mode-btn" data-mode="bots">
          <span class="mb-title">Play vs Bots</span>
          <span class="mb-sub">Solo against AI civilizations. Always available.</span>
        </button>
        <button class="mode-btn" data-mode="hotseat">
          <span class="mb-title">Pass &amp; Play</span>
          <span class="mb-sub">Several players, one device. Pass it around.</span>
        </button>
        <button class="mode-btn" data-mode="online">
          <span class="mb-title">Online Room</span>
          <span class="mb-sub">Create or join a room with a code. Play together live.</span>
        </button>
      </div>
      <div class="home-foot">Expansion: <b>Leaders</b> can be enabled in setup. 3–7 players.</div>
      <button class="home-learn" id="learn">📖 New here? Read How to Play</button>
    `;
    $$('.mode-btn', wrap).forEach(b => b.onclick = () => {
      App.mode = b.dataset.mode;
      if (App.mode === 'online') openOnlineEntry();
      else show('setup');
    });
    $('#learn', wrap).onclick = () => openGuide();
    r.appendChild(wrap);
  }

  // ===== SETUP (bots / hotseat) =====
  const SetupState = { count: 4, leaders: false, names: ['You', 'Bot 2', 'Bot 3', 'Bot 4', 'Bot 5', 'Bot 6', 'Bot 7'], wonders: [null, null, null, null, null, null, null] };
  function renderSetup(r) {
    const isHot = App.mode === 'hotseat';
    if (isHot) SetupState.names = ['Player 1', 'Player 2', 'Player 3', 'Player 4', 'Player 5', 'Player 6', 'Player 7'];
    const wrap = el('div', 'setup');
    wrap.innerHTML = `
      <button class="back">← back</button>
      <h2>${isHot ? 'Pass &amp; Play' : 'Play vs Bots'}</h2>
      <label class="field"><span>Players</span>
        <div class="stepper">
          <button data-d="-1">−</button><b id="pc">${SetupState.count}</b><button data-d="1">+</button>
        </div>
      </label>
      <div id="names" class="names"></div>
      <label class="toggle"><input type="checkbox" id="lead" ${SetupState.leaders ? 'checked' : ''}><span>Leaders expansion</span>
        <small>Draft powerful characters before the ages begin. Each leader you recruit stays in your city all game and grants a permanent bonus — shields, science, coins, or victory points.</small></label>
      <button class="primary" id="start">Begin the ages</button>
    `;
    $('.back', wrap).onclick = () => show('home');
    const drawNames = () => {
      const nm = $('#names', wrap); nm.innerHTML = '';
      for (let i = 0; i < SetupState.count; i++) {
        const row = el('div', 'name-row');
        const human = isHot ? true : i === 0;
        const sel = SetupState.wonders[i];
        row.innerHTML = `<span class="seat-tag ${human ? 'you' : 'bot'}">${human ? (isHot ? 'P' + (i + 1) : 'You') : 'AI'}</span>
          <input type="text" value="${SetupState.names[i]}" data-i="${i}">
          <span class="row-wonder">
            <span class="rw-emblem">${sel ? wonderEmblem(sel, 32) : placeholderEmblem(32)}</span>
            <select class="wsel" data-i="${i}" title="Choose this player's wonder">
              <option value="">Random</option>
              ${SW.WONDERS.map(w => `<option value="${w.short}" ${sel === w.short ? 'selected' : ''}>${w.short}</option>`).join('')}
            </select>
          </span>`;
        nm.appendChild(row);
      }
      $$('#names input', wrap).forEach(inp => inp.oninput = () => { SetupState.names[inp.dataset.i] = inp.value; });
      $$('#names .wsel', wrap).forEach(s => s.onchange = () => {
        const i = +s.dataset.i, val = s.value || null;
        // keep wonders unique: if another seat already holds this one, free it
        if (val) SetupState.wonders.forEach((w, j) => { if (j !== i && w === val) SetupState.wonders[j] = null; });
        SetupState.wonders[i] = val;
        drawNames();
      });
    };
    drawNames();
    $$('.stepper button', wrap).forEach(b => b.onclick = () => {
      SetupState.count = Math.max(3, Math.min(7, SetupState.count + (+b.dataset.d)));
      $('#pc', wrap).textContent = SetupState.count; drawNames();
    });
    $('#lead', wrap).onchange = e => SetupState.leaders = e.target.checked;
    $('#start', wrap).onclick = () => startLocalGame(isHot);
    r.appendChild(wrap);
  }

  function startLocalGame(isHot) {
    const seats = [];
    for (let i = 0; i < SetupState.count; i++) {
      seats.push({ id: 'p' + i, name: SetupState.names[i] || ('Player ' + (i + 1)), bot: isHot ? false : i !== 0 });
    }
    App.g = G.newGame({ seats, useLeaders: SetupState.leaders, wonders: SetupState.wonders.slice(0, SetupState.count) });
    App.viewSeat = 0;
    if (isHot) { App.mode = 'hotseat'; beginHotseatTurn(); }
    else { App.mode = 'bots'; show('game'); }
  }

  // ===== GAME RENDER =====
  function viewer() { return App.g.players[App.viewSeat]; }
  function ageLabel(a) { return ['I', 'II', 'III'][a - 1]; }

  function renderGame(r) {
    const g = App.g, me = viewer();
    const wrap = el('div', 'game');

    // top bar
    const top = el('div', 'topbar');
    const dirArrow = g.direction === 1 ? '↻ left' : '↺ right';
    top.innerHTML = `
      <div class="age-track">
        ${[1, 2, 3].map(a => `<span class="age-pip ${a === g.age ? 'on' : ''} ${a < g.age ? 'done' : ''}">${ageLabel(a)}</span>`).join('')}
      </div>
      <div class="turn-info">
        ${g.phase === 'leaderDraft' ? `Leader draft · round ${g.leaderDraftRound}/4` : `Age ${ageLabel(g.age)} · turn ${Math.min(g.turn, 6)}/6 · pass ${dirArrow}`}
      </div>
      <div class="top-right">
        <span class="coinbox" title="Coins">⊙ ${me.coins}</span>
        <button class="ghost" id="logbtn">Log</button>
        <button class="ghost" id="menubtn">Menu</button>
      </div>`;
    wrap.appendChild(top);

    // opponents row
    const opp = el('div', 'opponents');
    const n = g.n;
    // show in seating order around the table, viewer's neighbors flagged
    g.players.forEach((p, i) => {
      if (i === App.viewSeat) return;
      const rel = (i === (App.viewSeat - 1 + n) % n) ? 'left' : (i === (App.viewSeat + 1) % n) ? 'right' : '';
      opp.appendChild(cityCard(p, i, rel, false));
    });
    wrap.appendChild(opp);

    // your area: wonder + tableau
    const mine = el('div', 'myarea');
    mine.appendChild(wonderBoard(me, true));
    mine.appendChild(tableau(me, true));
    wrap.appendChild(mine);

    // hand / action
    const handWrap = el('div', 'handwrap');
    const committed = !!me.pendingMove;
    const canAct = canViewerAct();
    const handTitle = g.phase === 'leaderDraft' ? 'Choose a leader' : (committed ? 'Move locked — waiting…' : 'Your hand — choose a card');
    handWrap.appendChild(el('div', 'hand-title', handTitle));
    if (g.phase === 'leaderDraft') handWrap.appendChild(el('div', 'leader-note', 'Leaders are characters you keep for the whole game. Pick one now — you’ll pay coins to recruit it during the ages — and it grants a permanent bonus (extra shields, a science symbol, coins, or victory points). Tap any card to see what it does.'));
    handWrap.appendChild(handRow(me, canAct && !committed));
    wrap.appendChild(handWrap);

    // waiting status (online)
    if (App.mode === 'online') {
      const w = el('div', 'online-status');
      const waiting = g.players.filter(p => !p.bot && !p.pendingMove).map(p => p.name);
      w.innerHTML = committed
        ? `Waiting for: ${waiting.length ? waiting.join(', ') : 'resolution…'} <span class="dot"></span>`
        : `Room <b>${App.online.code}</b> · you are <b>${me.name}</b>`;
      wrap.appendChild(w);
    }

    r.appendChild(wrap);
    // always show the leftmost card first when the hand (re)renders
    if (typeof requestAnimationFrame !== 'undefined') requestAnimationFrame(() => { const h = $('.hand'); if (h) h.scrollLeft = 0; });
    else { const h = $('.hand'); if (h) h.scrollLeft = 0; }

    // detail/action panel host is a persistent element in <body>

    $('#menubtn', wrap).onclick = openMenu;
    $('#logbtn', wrap).onclick = openLog;
  }

  function canViewerAct() {
    const g = App.g, me = viewer();
    if (g.phase === 'finished') return false;
    if (App.mode === 'bots') return App.viewSeat === 0 && !me.pendingMove;
    if (App.mode === 'hotseat') return !me.pendingMove;
    if (App.mode === 'online') return App.viewSeat === App.online.seat && !me.pendingMove;
    return false;
  }

  // compact opponent city
  function cityCard(p, idx, rel, full) {
    const c = el('div', 'city' + (rel ? ' nb-' + rel : ''));
    const counts = {}; SW.COLORS.forEach(col => counts[col] = 0);
    p.built.forEach(card => counts[card.color]++);
    const shields = SW.shieldsOf(p);
    const sci = SW.scienceSymbols(p);
    const sciStr = ['compass', 'gear', 'tablet'].filter(k => sci.sym[k] || (k === 'compass' && sci.wild)).map(k => `${SCI[k][0]}${sci.sym[k]}`).join(' ') + (sci.wild ? ` +${sci.wild}?` : '');
    const tokens = (p.warTokens || []).reduce((a, b) => a + b, 0);
    c.innerHTML = `
      <div class="city-head">
        <span class="city-name">${escapeHtml(p.name)}</span>
        ${rel ? `<span class="nb-tag">${rel}</span>` : ''}
      </div>
      <div class="city-wonder">${escapeHtml(p.wonder.short)} <span class="wpips">${p.wonder.stages.map((s, i) => `<i class="${i < p.stagesBuilt.length ? 'f' : ''}"></i>`).join('')}</span></div>
      <div class="city-row">
        ${colorDot('brown', counts.brown)}${colorDot('grey', counts.grey)}${colorDot('blue', counts.blue)}${colorDot('yellow', counts.yellow)}${colorDot('green', counts.green)}${colorDot('red', counts.red)}${counts.purple ? colorDot('purple', counts.purple) : ''}
      </div>
      <div class="city-stats">
        <span title="Coins">⊙${p.coins}</span>
        <span title="Shields" class="s-mil">⚔${shields}</span>
        <span title="War result" class="${(p.military || 0) >= 0 ? 'pos' : 'neg'}">${(p.military || 0) >= 0 ? '+' : ''}${p.military || 0}</span>
        ${sciStr.trim() ? `<span class="s-sci">${sciStr}</span>` : ''}
      </div>`;
    c.onclick = () => openCityDetail(p, idx);
    return c;
  }
  function colorDot(col, n) {
    if (!n) return `<span class="cdot empty" data-col="${col}"></span>`;
    return `<span class="cdot" data-col="${col}">${n}</span>`;
  }

  function wonderBoard(p, mineFlag) {
    const w = el('div', 'wonder');
    const stages = p.wonder.stages.map((s, i) => {
      const built = i < p.stagesBuilt.length;
      const eff = s.effect;
      let icon = '';
      if (eff.vp) icon = `${eff.vp}▲`;
      else if (eff.shields) icon = '⚔'.repeat(eff.shields);
      else if (eff.coins) icon = `+${eff.coins}⊙`;
      else if (eff.scienceWild) icon = '?sci';
      else if (eff.produceChoice) icon = 'res?';
      else if (eff.freeBuildPerAge) icon = 'free';
      const cost = SW.RES.filter(r => s.cost[r]).map(r => resChip(r, s.cost[r])).join('');
      return `<div class="stage ${built ? 'built' : ''}">
          <div class="stage-cost">${cost}</div>
          <div class="stage-reward">${icon}</div>
        </div>`;
    }).join('');
    w.innerHTML = `
      <div class="wonder-head">${wonderEmblem(p.wonder.short, 44)}
        <div><div class="wonder-name">${escapeHtml(p.wonder.name)}</div>
        <div class="wonder-sub">starts with ${resChip(p.wonder.start)} · ${p.leaders && p.leaders.length ? 'leaders: ' + p.leaders.map(l => l.name).join(', ') : 'no leader'}</div></div>
      </div>
      <div class="stages">${stages}</div>`;
    return w;
  }

  function tableau(p, mineFlag) {
    const t = el('div', 'tableau');
    const order = ['brown', 'grey', 'red', 'yellow', 'green', 'blue', 'purple'];
    order.forEach(col => {
      const cards = p.built.filter(c => c.color === col);
      if (!cards.length) return;
      const colDiv = el('div', 'tcol');
      cards.forEach((c, i) => {
        const card = el('div', 'tcard c-' + col);
        card.style.top = (i * 22) + 'px';
        card.innerHTML = `<span class="tc-name">${escapeHtml(c.name)}</span><span class="tc-eff">${effectHTML(c)}</span>`;
        card.title = c.name + ' — tap for details';
        card.onclick = () => openCardInfo(c);
        colDiv.appendChild(card);
      });
      colDiv.style.height = (cards.length * 22 + 40) + 'px';
      t.appendChild(colDiv);
    });
    if (!p.built.length) t.appendChild(el('div', 'empty-note', 'No buildings yet. Your city awaits.'));
    return t;
  }

  function handRow(p, interactive) {
    const g = App.g;
    const hand = g.phase === 'leaderDraft' ? p.leaderHand : p.hand;
    const row = el('div', 'hand');
    const moves = interactive ? G.legalMoves(g, p) : [];
    const byUid = {}; moves.forEach(m => { (byUid[m.uid] = byUid[m.uid] || []).push(m); });
    if (p.pendingMove) {
      row.appendChild(el('div', 'locked-note', 'Move locked in. ' + (App.mode === 'bots' ? 'Resolving…' : 'Waiting for others…')));
      return row;
    }
    hand.forEach(card => {
      const cd = el('div', 'handcard c-' + card.color);
      const canBuild = (byUid[card.uid] || []).some(m => m.type === 'build');
      const canWonder = (byUid[card.uid] || []).some(m => m.type === 'wonder');
      cd.innerHTML = `
        <div class="hc-head">${cardEmblem(card, 34)}<span class="hc-name">${escapeHtml(card.name)}</span></div>
        <div class="hc-cost">${card.cost && (card.cost.coins || Object.values(card.cost.res || {}).some(Boolean)) ? costHTML(card) : (card.leader ? '<span class="coin">' + (card.cost.coins || 0) + '</span>' : '<span class="free">free</span>')}</div>
        <div class="hc-eff">${card.leader ? escapeHtml(card.desc || '') : effectHTML(card)}</div>
        ${card.chainFrom ? `<div class="hc-chain">links from ${card.chainFrom.join('/')}</div>` : ''}
        <div class="hc-flags">
          ${interactive ? `${canBuild ? '<i class="ok">build</i>' : '<i class="no">can\'t build</i>'}${canWonder ? '<i class="ok">wonder</i>' : ''}` : ''}
          <button type="button" class="hc-info">ⓘ Details</button>
        </div>
      `;
      if (interactive) cd.onclick = () => openActions(card, byUid[card.uid] || []);
      else { cd.classList.add('static'); cd.onclick = () => openCardInfo(card); }
      const info = cd.querySelector('.hc-info');
      if (info) info.onclick = (e) => { e.stopPropagation(); openCardInfo(card); };
      row.appendChild(cd);
    });
    return row;
  }

  // ===== action sheet =====
  function openActions(card, moves) {
    const host = $('#panelhost'); if (!host) return;
    const g = App.g, me = viewer();
    const sheet = el('div', 'sheet');
    const acts = [];
    if (g.phase === 'leaderDraft') {
      acts.push({ label: `Recruit ${escapeHtml(card.name)} later (pick)`, sub: card.desc, m: moves.find(m => m.type === 'pickLeader') });
    } else {
      const build = moves.find(m => m.type === 'build');
      if (build) {
        const cost = build.free ? (build.viaToken ? 'free (token)' : 'free (chain)') : (build.pay.totalCoins ? build.pay.totalCoins + ' coins' : 'free');
        acts.push({ label: `Build ${escapeHtml(card.name)}`, sub: 'Cost: ' + cost, m: build, kind: 'build' });
      } else {
        acts.push({ label: `Build ${escapeHtml(card.name)}`, sub: 'You can’t afford this or already own it.', disabled: true });
      }
      const wonder = moves.find(m => m.type === 'wonder');
      const nextStage = me.stagesBuilt.length;
      if (wonder) {
        const cost = wonder.pay.totalCoins ? wonder.pay.totalCoins + ' coins' : 'free';
        acts.push({ label: `Bury under Wonder (stage ${nextStage + 1})`, sub: 'Cost: ' + cost + ' · gain stage reward', m: wonder, kind: 'wonder' });
      } else if (nextStage < me.wonder.stages.length) {
        acts.push({ label: `Build Wonder stage ${nextStage + 1}`, sub: 'You can’t afford the stage cost.', disabled: true });
      }
      const discard = moves.find(m => m.type === 'discard');
      if (discard) acts.push({ label: 'Discard for 3 coins', sub: 'Sell the card to the bank.', m: discard, kind: 'discard' });
    }
    sheet.innerHTML = `<div class="sheet-card c-${card.leader ? 'leader' : card.color}">
        <div class="sc-emblem">${cardEmblem(card, 52)}</div>
        <div class="sc-body">
          <div class="sc-label">${card.leader ? 'Leader' : (COLOR_LABEL[card.color] || '')}</div>
          <div class="sc-name">${escapeHtml(card.name)}</div>
          <div class="sc-desc">${escapeHtml(describe(card))}</div>
        </div>
      </div>`;
    const list = el('div', 'sheet-acts');
    acts.forEach(a => {
      const b = el('button', 'act' + (a.disabled ? ' disabled' : '') + (a.kind ? ' k-' + a.kind : ''));
      b.innerHTML = `<span class="act-label">${a.label}</span><span class="act-sub">${a.sub || ''}</span>`;
      if (!a.disabled && a.m) b.onclick = () => { closePanel(); doCommit(a.m); };
      list.appendChild(b);
    });
    sheet.appendChild(list);

      <div class="rules">
        <h4>The goal</h4>
        <p>Build the most impressive city over three ages. When the dust settles you add up victory points from every source — the highest total wins (ties broken by coins in your treasury).</p>

        <h4>How a turn works</h4>
        <p>Everyone is dealt a hand of 7 cards. <b>At the same time</b>, each player secretly chooses one card to play, reveals it, then passes the rest of their hand to a neighbor. You keep doing this until only the last cards remain. That repeats for Age I, Age II, and Age III.</p>

        <h4>Three things you can do with your chosen card</h4>

        <p><b>2 · Bury it under your Wonder.</b> Instead of building the card's face, slide it under your Wonder board to construct the next Wonder stage — you pay that stage's cost (not the card's) and gain the stage's reward. Each Wonder has stages worth points and special powers.</p>

        <p>Short a resource? You may <b>buy it from a neighbor</b> who produces it — 2 coins each (or 1 with the matching trading post). You never use up their resource; you just pay to borrow its production this turn.</p>

        <h4>The seven card colors</h4>
        <p><span class="cdot" data-col="brown">B</span> <b>Brown — raw materials.</b> Produce wood/stone/clay/ore.</p>
        <p><span class="cdot" data-col="grey">G</span> <b>Grey — manufactured goods.</b> Produce glass/papyrus/loom.</p>
        <p><span class="cdot" data-col="blue">C</span> <b>Blue — civilian.</b> Straight victory points. The safe, reliable path.</p>
        <p><span class="cdot" data-col="yellow">Y</span> <b>Yellow — commercial.</b> Coins, trade discounts, and some end-game points.</p>

        <h4>Military ⚔</h4>
        <p>At the <b>end of each age</b> your shields are compared with your left neighbor and your right neighbor separately. Win a comparison and you gain a victory token worth <b>+1 in Age I, +3 in Age II, +5 in Age III</b>. Lose and you take a −1 defeat token. A tie scores nothing. You never need to "use up" shields — they simply total up each age.</p>

        <p>Collect the three symbols — compass ${sci('compass')}, gear ${sci('gear')}, tablet ${sci('tablet')}. Scoring rewards both depth and variety:</p>

        <p>So spreading across all three is usually stronger than piling into one. A few cards and leaders give a "wild" symbol that counts as whichever helps most.</p>

        <h4>Wonders</h4>
        <p>Your Wonder (your "nation") gives a free resource each turn and has three stages you build by burying cards. Stages give big points and unique powers — extra coins, a free build each age, a wild science symbol, and so on. You can pick your Wonder at the start, or leave it random.</p>

  // ============================================================
  // ONLINE MULTIPLAYER (shared persistent storage)
  // ============================================================
  const NATIVE = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');
  const API = '/api/store';
  const Store = {
    async get(key) {
      const k = App.storageKeyPrefix + key;
      if (NATIVE) { try { const r = await window.storage.get(k, true); return r ? JSON.parse(r.value) : null; } catch (e) { return null; } }
      try { const res = await fetch(API + '?key=' + encodeURIComponent(k)); if (!res.ok) return null; const j = await res.json(); return j && j.value != null ? j.value : null; } catch (e) { return null; }
    },
    async set(key, val) {
      const k = App.storageKeyPrefix + key;
      if (NATIVE) { try { await window.storage.set(k, JSON.stringify(val), true); return true; } catch (e) { return false; } }
      try { const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: k, value: val }) }); return res.ok; } catch (e) { return false; }
    },
    async del(key) {
      const k = App.storageKeyPrefix + key;
      if (NATIVE) { try { await window.storage.delete(k, true); } catch (e) { } return; }
      try { await fetch(API + '?key=' + encodeURIComponent(k), { method: 'DELETE' }); } catch (e) { }
    },
  };
  function hasStorage() {
    if (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function') return true;
    return location.protocol === 'http:' || location.protocol === 'https:';
  }
  function code4() { const a = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s = ''; for (let i = 0; i < 4; i++) s += a[Math.floor(Math.random() * a.length)]; return s; }
  function myId() { if (!App._id) App._id = 'u' + Math.random().toString(36).slice(2, 8); return App._id; }

  async function createRoom(name) {

  async function joinRoom(code, name) {
    if (!code || code.length !== 4) { toast('Enter a 4-letter room code.'); return; }
    const room = await Store.get('room_' + code);
    if (!room) { toast('No room found with that code.'); return; }

    if (!room.seats.some(s => s.id === myId())) {

  let lobbyTimer = null, gameTimer = null;
  // each player writes only their own pick key; the host folds picks into the room (unique, earliest-claim-wins)
  async function mergePicks(room) {
    let changed = false;
    const picks = [];
    for (const s of room.seats) {
      if (s.bot) continue;
      const p = await Store.get('pick_' + room.code + '_' + s.id);
      if (p === null || p === undefined) { picks.push({ s, has: false }); continue; }
      const w = (p && typeof p === 'object') ? (p.w || '') : (p || ''); // '' = random
      const t = (p && typeof p === 'object' && p.t) ? p.t : 0;
      picks.push({ s, has: true, w: w || null, t });
    }
    // resolve collisions: earliest timestamp keeps the wonder, later claimants get bumped
    const claimants = picks.filter(x => x.has && x.w).sort((a, b) => a.t - b.t);
    const used = new Set(); const winner = new Map();
    for (const c of claimants) {
      if (!used.has(c.w)) { used.add(c.w); winner.set(c.s.id, c.w); }
      else winner.set(c.s.id, null); // bumped
    }
    for (const x of picks) {
      if (!x.has) continue;
      const w = !x.w ? null : (winner.get(x.s.id) || null);
      if (x.w && w === null) await Store.set('pick_' + room.code + '_' + x.s.id, { w: '', t: Date.now() }); // reset bumped pick to Random
      if (x.s.wonder !== w) { x.s.wonder = w; changed = true; }
    }
    return changed;
  }
  function startLobbyPoll() {
    stopPolling();
    lobbyTimer = setInterval(async () => {
      const room = await Store.get('room_' + App.online.code);
      if (!room) return;
      if (App.online.isHost) {
        const changed = await mergePicks(room);
        if (changed) { room.updated = Date.now(); await Store.set('room_' + room.code, room); }
      }
      // detect if my own pick was bumped by an earlier claim, so I can choose again
      if (App.online.myWonder) {
        const meSeat = room.seats.find(s => s.id === myId());
        const mine = App.online.myWonder;
        const takenByOther = room.seats.some(s => s.id !== myId() && s.wonder === mine);
        if (meSeat && meSeat.wonder !== mine && takenByOther) {
          App.online.myWonder = null;
          toast(mine + ' was taken — please pick another wonder.');
        }
      }
      App.room = room;
      App.online.seat = room.seats.findIndex(s => s.id === myId());
      if (room.started) { clearInterval(lobbyTimer); lobbyTimer = null; enterOnlineGame(); return; }
      if (App.screen === 'lobby') render();
    }, 2000);
  }
  function stopPolling() { if (lobbyTimer) { clearInterval(lobbyTimer); lobbyTimer = null; } if (gameTimer) { clearInterval(gameTimer); gameTimer = null; } }
