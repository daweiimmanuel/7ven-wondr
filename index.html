  async function startOnlineGame() {
    const room = App.room;
    await mergePicks(room); // pull in everyone's latest wonder choice
    const seats = room.seats.slice();
    let bi = seats.length + 1;
    while (seats.length < room.maxBotsTo) seats.push({ id: 'bot' + bi, name: 'Bot ' + bi, bot: true }), bi++;
    if (seats.length < 3) { while (seats.length < 3) seats.push({ id: 'bot' + bi, name: 'Bot ' + bi, bot: true }), bi++; }
    const g = G.newGame({ seats, useLeaders: room.leaders, wonders: seats.map(s => s.wonder || null) });
    room.started = true; room.seatOrder = seats.map(s => ({ id: s.id, name: s.name, bot: s.bot }));
    room.updated = Date.now();
    await Store.set('room_' + room.code, room);
    await Store.set('game_' + room.code, g);
    App.g = g;
    enterOnlineGame();
  }

  async function enterOnlineGame() {
    App.mode = 'online';
    // load game
    const g = await Store.get('game_' + App.online.code);
    if (g) App.g = g;
    App.online.seat = App.g.players.findIndex(p => p.id === myId());
    if (App.online.seat < 0) App.online.seat = 0; // spectator fallback
    App.viewSeat = App.online.seat;
    show('game');
    startGamePoll();
  }

  function startGamePoll() {
    stopPolling();
    gameTimer = setInterval(onlineTick, 2200);
    onlineTick();
  }

  async function onlineTick() {
    if (!App.online) return;
    const code = App.online.code;
    // 1) refresh game state
    const remote = await Store.get('game_' + code);
    if (remote && (!App.g || remote.version >= App.g.version)) {
      const myPending = App.g && App.g.players[App.online.seat] ? App.g.players[App.online.seat].pendingMove : null;
      App.g = remote;
      // preserve our own pending visual if newer turn hasn't resolved
      if (App.screen === 'game' && !closedPanelOpen()) render();
    }
    if (App.g && App.g.phase === 'finished') { stopPolling(); show('score'); return; }
    // 2) if host, gather moves and resolve
    if (App.online.isHost && App.g) await hostResolveIfReady();
  }
  function closedPanelOpen() { const h = $('#panelhost'); return h && h.classList.contains('open'); }

  async function pushMyMove(move) {
    if (!App.online) return;
    const code = App.online.code;
    const turnId = turnKey(App.g);
    await Store.set('move_' + code + '_' + App.online.seat, { turnId, move, by: myId() });
    // mark locally
    if (App.g.players[App.online.seat]) App.g.players[App.online.seat].pendingMove = move;
    // host resolves on its own tick; non-host just waits
    if (App.online.isHost) await hostResolveIfReady();
  }
  function turnKey(g) { return g.phase + ':' + g.age + ':' + g.turn + ':' + (g.leaderDraftRound || 0); }

  let hostBusy = false;
  async function hostResolveIfReady() {
    if (hostBusy) return; hostBusy = true;
    try {
      const code = App.online.code;
      let g = await Store.get('game_' + code); if (!g) { return; }
      const tk = turnKey(g);
      // collect human moves
      const humans = g.players.map((p, i) => ({ p, i })).filter(x => !x.p.bot);
      let allIn = true;
      for (const h of humans) {
        if (h.p.pendingMove) continue;
        const mv = await Store.get('move_' + code + '_' + h.i);
        if (mv && mv.turnId === tk) { g.players[h.i].pendingMove = mv.move; }
        else allIn = false;
      }
      // bots
      G.autoCommitBots(g);
      if (allIn && G.allCommitted(g)) {
        G.resolveTurn(g);
        // clear move keys for next turn
        for (const h of humans) { await Store.del('move_' + code + '_' + h.i); }
        await Store.set('game_' + code, g);
        App.g = g;
        App.online.seat = g.players.findIndex(p => p.id === myId());
        if (App.screen === 'game' && !closedPanelOpen()) render();
        if (g.phase === 'finished') { stopPolling(); show('score'); }
      } else {
        // persist partial pending (so others see who's locked)
        await Store.set('game_' + code, g);
        App.g = g;
        if (App.screen === 'game' && !closedPanelOpen()) render();
      }
    } finally { hostBusy = false; }
  }

  // ===== misc =====
  function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
  let toastTimer;
  function toast(msg) {
    let t = $('#toast'); if (!t) { t = el('div'); t.id = 'toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // boot
  window.addEventListener('DOMContentLoaded', () => { render(); });
  window.SWUI = App;
})();

</script>
</body>
